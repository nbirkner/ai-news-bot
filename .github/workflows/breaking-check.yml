name: Breaking News Check

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run breaking check
        env:
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main_breaking.py

      - name: Commit updated state
        run: |
          git config user.name "ai-news-bot"
          git config user.email "ai-news-bot@together.ai"
          git add state/seen_articles.json
          git diff --staged --quiet || git commit -m "chore: update seen_articles [skip ci]"
          git push
